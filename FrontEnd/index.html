<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackform — MERN & Android development</title>
    <script>
      // Runs before React mounts so there's no flash of the wrong theme
      // on reload — reads the same key ThemeContext writes to.
      (function () {
        try {
          var saved = localStorage.getItem("stackform-theme");
          var theme = saved === "light" || saved === "dark"
            ? saved
            : (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-ink text-offwhite font-body">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
